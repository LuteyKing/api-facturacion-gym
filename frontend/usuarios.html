<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios | POWER GYM</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3003/3003984.png">
    <meta name="description" content="Gestión de usuarios y trabajadores. Sistema de facturación electrónica para Gimnasio y CrossFit.">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Shared Styles -->
    <link rel="stylesheet" href="css/shared.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gym-yellow': '#FFD700',
                        'gym-yellow-hover': '#E6C200',
                        'gym-yellow-soft': '#FFF8DC',
                        'gym-black': '#0D0D0D',
                        'gym-dark': '#111111',
                        'gym-surface': '#1A1A1A',
                    },
                    fontFamily: {
                        'inter': ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
        .animate-shake { animation: shake 0.4s ease-out; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }

        .table-row-hover { transition: all 0.2s ease; }
        .table-row-hover:hover {
            background-color: var(--bg-hover-row) !important;
            transform: scale(1.002);
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }

        .toast {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            animation: slideDown 0.4s ease-out;
            max-width: 400px;
        }
        .toast.toast-exit {
            animation: fadeInUp 0.3s ease-out reverse forwards;
        }

        .btn-guardar {
            background: linear-gradient(135deg, #FFD700 0%, #E6C200 100%);
            color: #0D0D0D;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-guardar::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }
        .btn-guardar:hover::before { left: 100%; }
        .btn-guardar:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
        }
        .btn-guardar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .form-input-gym {
            transition: all 0.3s ease;
            border: 1.5px solid var(--border-input);
            background: var(--bg-input);
            color: var(--text-primary);
        }
        .form-input-gym:focus {
            border-color: #FFD700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.15);
            outline: none;
        }
    </style>
</head>
<body>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="main-content">

        <!-- Hero -->
        <div class="page-hero mb-3">
            <h2><i class="bi bi-shield-lock-fill"></i> Gestión de Usuarios</h2>
            <p>Administra los trabajadores y sus accesos al sistema.</p>
        </div>

        <!-- Botón Nuevo -->
        <div class="flex justify-end mb-8 animate-fade-in-up">
            <button onclick="abrirModalNuevo()" class="btn-guardar inline-flex items-center gap-2 px-5 py-3 rounded-xl font-bold text-sm tracking-wide">
                <i class="bi bi-person-plus-fill text-base"></i>
                Nuevo Usuario
            </button>
        </div>

        <!-- Tabla -->
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden animate-fade-in-up" style="animation-delay: 0.1s;">
            <div class="bg-gym-black px-6 py-4 border-b-4 border-gym-yellow">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-gym-yellow rounded-lg flex items-center justify-center">
                        <i class="bi bi-shield-lock-fill text-gym-black text-sm"></i>
                    </div>
                    <div>
                        <h3 class="text-white font-bold text-sm tracking-tight">Directorio de Usuarios</h3>
                        <p class="text-gray-400 text-xs mt-0.5">Trabajadores con acceso al sistema</p>
                    </div>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-3.5 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Nombre</th>
                            <th class="px-6 py-3.5 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Usuario</th>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-gray-500 uppercase tracking-wider">Rol</th>
                            <th class="px-6 py-3.5 text-center text-xs font-bold text-gray-500 uppercase tracking-wider">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla" class="divide-y divide-gray-100">
                    </tbody>
                </table>
            </div>

            <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex items-center justify-between" id="tableFooter" style="display: none;">
                <p class="text-xs text-gray-400" id="footerInfo"></p>
                <button onclick="cargarUsuarios()" class="inline-flex items-center gap-2 text-sm font-semibold text-gym-dark hover:text-gym-yellow transition-colors duration-300">
                    <i class="bi bi-arrow-clockwise"></i> Actualizar
                </button>
            </div>
        </div>

    <!-- ═══ MODAL: Nuevo Usuario ═══ -->
    <div id="modalNuevo" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="cerrarModalNuevo()"></div>
        <div class="relative w-full max-w-md bg-[#1A1A1A] border border-yellow-500/20 rounded-2xl shadow-2xl overflow-hidden" style="animation: fadeInUp 0.3s ease-out;">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-700/50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-yellow-500/10 rounded-xl flex items-center justify-center">
                        <i class="bi bi-person-plus-fill text-yellow-400 text-lg"></i>
                    </div>
                    <h3 class="text-white font-bold text-sm">Nuevo Usuario</h3>
                </div>
                <button onclick="cerrarModalNuevo()" class="text-gray-500 hover:text-white transition-colors p-1">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <form id="formNuevo" class="px-6 py-5 space-y-4" onsubmit="return false;">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Nombre Completo <span class="text-red-400">*</span></label>
                    <input type="text" id="nuevoNombre" class="form-input-gym w-full px-4 py-3 rounded-xl text-sm bg-[#111] text-white border-gray-700" placeholder="Juan Carlos López" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Usuario (login) <span class="text-red-400">*</span></label>
                    <input type="text" id="nuevoUsername" class="form-input-gym w-full px-4 py-3 rounded-xl text-sm bg-[#111] text-white border-gray-700" placeholder="jcarlos" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Contraseña <span class="text-red-400">*</span></label>
                    <input type="password" id="nuevoPassword" class="form-input-gym w-full px-4 py-3 rounded-xl text-sm bg-[#111] text-white border-gray-700" placeholder="••••••••" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Rol</label>
                    <select id="nuevoRol" class="form-input-gym w-full px-4 py-3 rounded-xl text-sm bg-[#111] text-white border-gray-700">
                        <option value="vendedor">Vendedor</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <button type="button" id="btnCrear" onclick="crearUsuario()" class="btn-guardar w-full py-3.5 rounded-xl font-bold text-sm tracking-wide flex items-center justify-center gap-2 mt-2">
                    <i class="bi bi-check-lg text-base"></i> Crear Usuario
                </button>
            </form>
        </div>
    </div>

    <!-- ═══ MODAL: Cambiar Contraseña ═══ -->
    <div id="modalPassword" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="cerrarModalPassword()"></div>
        <div class="relative w-full max-w-sm bg-[#1A1A1A] border border-yellow-500/20 rounded-2xl shadow-2xl overflow-hidden" style="animation: fadeInUp 0.3s ease-out;">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-700/50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-yellow-500/10 rounded-xl flex items-center justify-center">
                        <i class="bi bi-key-fill text-yellow-400 text-lg"></i>
                    </div>
                    <div>
                        <h3 class="text-white font-bold text-sm">Cambiar Contraseña</h3>
                        <p id="passwordUsuarioNombre" class="text-yellow-400 text-xs font-semibold"></p>
                    </div>
                </div>
                <button onclick="cerrarModalPassword()" class="text-gray-500 hover:text-white transition-colors p-1">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <div class="px-6 py-5 space-y-4">
                <input type="hidden" id="passwordUsuarioId">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Nueva Contraseña <span class="text-red-400">*</span></label>
                    <input type="password" id="nuevaPassword" class="form-input-gym w-full px-4 py-3 rounded-xl text-sm bg-[#111] text-white border-gray-700" placeholder="••••••••">
                </div>
                <button type="button" onclick="guardarPassword()" class="btn-guardar w-full py-3.5 rounded-xl font-bold text-sm tracking-wide flex items-center justify-center gap-2">
                    <i class="bi bi-check-lg text-base"></i> Guardar Contraseña
                </button>
            </div>
        </div>
    </div>

    <!-- ═══ JAVASCRIPT ═══ -->
    <script src="js/layout.js"></script>
    <script src="js/api.js"></script>
    <script>
    initLayout('usuarios');
    initSessionGuard({ requireAdmin: true });

    window.onload = function() {
        cargarUsuarios();
    };

    async function cargarUsuarios() {
        const cuerpo = document.getElementById('cuerpoTabla');
        const footer = document.getElementById('tableFooter');
        footer.style.display = 'none';

        cuerpo.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            cuerpo.innerHTML += `
                <tr style="animation: fadeInUp 0.3s ease-out ${i * 0.08}s both;">
                    <td class="px-6 py-4"><div class="skeleton h-5 w-36"></div></td>
                    <td class="px-6 py-4"><div class="skeleton h-5 w-24"></div></td>
                    <td class="px-6 py-4 text-center"><div class="skeleton h-6 w-20 mx-auto rounded-full"></div></td>
                    <td class="px-6 py-4 text-center"><div class="skeleton h-8 w-40 mx-auto rounded-lg"></div></td>
                </tr>`;
        }

        try {
            const resp = await fetch(`${API_BASE_URL}/api/v1/usuarios`, { headers: authHeaders() });
            if (!resp.ok) throw new Error(`Error ${resp.status}`);
            const usuarios = await resp.json();

            await new Promise(r => setTimeout(r, 300));

            if (usuarios.length === 0) {
                cuerpo.innerHTML = `
                    <tr><td colspan="4" class="px-6 py-16 text-center">
                        <div class="flex flex-col items-center gap-3 animate-fade-in-up">
                            <div class="w-16 h-16 bg-gym-yellow/10 rounded-2xl flex items-center justify-center">
                                <i class="bi bi-people text-3xl text-gym-yellow/60"></i>
                            </div>
                            <p class="text-gray-500 font-semibold">No hay usuarios registrados</p>
                        </div>
                    </td></tr>`;
                return;
            }

            renderizarTabla(usuarios);
        } catch (e) {
            cuerpo.innerHTML = `
                <tr><td colspan="4" class="px-6 py-14 text-center">
                    <div class="flex flex-col items-center gap-3 animate-fade-in-up">
                        <i class="bi bi-exclamation-triangle text-4xl text-red-400"></i>
                        <p class="text-gray-600 font-semibold">Error de conexión</p>
                        <p class="text-gray-400 text-sm">${e.message}</p>
                        <button onclick="cargarUsuarios()" class="mt-2 inline-flex items-center gap-2 bg-gym-dark text-gym-yellow px-5 py-2.5 rounded-lg text-sm font-bold hover:bg-gym-black transition-all border border-gym-yellow/30">
                            <i class="bi bi-arrow-clockwise"></i> Reintentar
                        </button>
                    </div>
                </td></tr>`;
        }
    }

    function renderizarTabla(usuarios) {
        const cuerpo = document.getElementById('cuerpoTabla');
        const footer = document.getElementById('tableFooter');

        let html = '';
        usuarios.forEach((u, index) => {
            const esAdmin = u.rol === 'admin';
            const badgeColor = esAdmin
                ? 'bg-yellow-100 text-yellow-800 border border-yellow-300'
                : 'bg-blue-100 text-blue-800 border border-blue-300';
            const rolLabel = esAdmin ? 'Admin' : 'Vendedor';

            const iniciales = u.nombre_completo.split(' ').slice(0, 2).map(n => n.charAt(0).toUpperCase()).join('');

            html += `
                <tr class="table-row-hover" style="animation: slideDown 0.3s ease-out ${index * 0.04}s both;">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 ${esAdmin ? 'bg-yellow-100 text-yellow-700' : 'bg-blue-100 text-blue-700'} rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0">
                                ${iniciales}
                            </div>
                            <span class="text-sm font-semibold text-gray-800">${escapeHtml(u.nombre_completo)}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="font-mono text-sm text-gray-600 bg-gray-100 px-2.5 py-1 rounded-lg">${escapeHtml(u.username)}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold ${badgeColor}">
                            <i class="bi ${esAdmin ? 'bi-shield-fill' : 'bi-person-fill'} mr-1"></i>
                            ${rolLabel}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="inline-flex items-center gap-2">
                            <button onclick="abrirModalPassword(${u.id}, '${escapeHtml(u.nombre_completo).replace(/'/g, "\\'")}')"
                                    class="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-bold tracking-wide transition-all duration-300 hover:scale-105 bg-yellow-500/10 text-yellow-600 border border-yellow-500/20 hover:bg-yellow-500/20 hover:border-yellow-500/40"
                                    title="Cambiar contraseña">
                                <i class="bi bi-key-fill"></i> Contraseña
                            </button>
                            <button onclick="eliminarUsuario(${u.id}, '${escapeHtml(u.nombre_completo).replace(/'/g, "\\'")}')"
                                    class="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-bold tracking-wide transition-all duration-300 hover:scale-105 bg-red-500/10 text-red-500 border border-red-500/20 hover:bg-red-500/20 hover:border-red-500/40"
                                    title="Eliminar usuario">
                                <i class="bi bi-trash3-fill"></i> Eliminar
                            </button>
                        </div>
                    </td>
                </tr>`;
        });

        cuerpo.innerHTML = html;
        footer.style.display = 'flex';
        document.getElementById('footerInfo').textContent = `Total: ${usuarios.length} usuario${usuarios.length !== 1 ? 's' : ''}`;
    }

    // ── Crear Usuario ──────────────────────────────────
    async function crearUsuario() {
        const nombre = document.getElementById('nuevoNombre').value.trim();
        const username = document.getElementById('nuevoUsername').value.trim();
        const password = document.getElementById('nuevoPassword').value;
        const rol = document.getElementById('nuevoRol').value;

        if (!nombre || !username || !password) {
            mostrarToast('Completa todos los campos obligatorios.', 'error');
            return;
        }
        if (password.length < 4) {
            mostrarToast('La contraseña debe tener al menos 4 caracteres.', 'error');
            return;
        }

        const btn = document.getElementById('btnCrear');
        btn.disabled = true;
        btn.innerHTML = '<div class="w-5 h-5 border-2 border-gym-black border-t-transparent rounded-full animate-spin"></div> Creando...';

        try {
            const resp = await fetch(`${API_BASE_URL}/api/v1/usuarios`, {
                method: 'POST',
                headers: authHeaders({ 'Content-Type': 'application/json' }),
                body: JSON.stringify({ username, password, nombre_completo: nombre, rol }),
            });
            const data = await resp.json();

            if (resp.ok) {
                mostrarToast(`✅ Usuario "${username}" creado exitosamente.`, 'success');
                cerrarModalNuevo();
                cargarUsuarios();
            } else {
                mostrarToast(`⚠️ ${data.detail || 'Error al crear usuario'}`, 'error');
            }
        } catch (e) {
            mostrarToast(`❌ Error de conexión: ${e.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-check-lg text-base"></i> Crear Usuario';
        }
    }

    // ── Cambiar Contraseña ─────────────────────────────
    async function guardarPassword() {
        const id = document.getElementById('passwordUsuarioId').value;
        const pwd = document.getElementById('nuevaPassword').value;

        if (!pwd) {
            mostrarToast('Ingresa la nueva contraseña.', 'error');
            return;
        }
        if (pwd.length < 4) {
            mostrarToast('La contraseña debe tener al menos 4 caracteres.', 'error');
            return;
        }

        try {
            const resp = await fetch(`${API_BASE_URL}/api/v1/usuarios/${id}/password`, {
                method: 'PUT',
                headers: authHeaders({ 'Content-Type': 'application/json' }),
                body: JSON.stringify({ nueva_password: pwd }),
            });
            const data = await resp.json();

            if (resp.ok) {
                mostrarToast('✅ Contraseña actualizada correctamente.', 'success');
                cerrarModalPassword();
            } else {
                mostrarToast(`⚠️ ${data.detail || 'Error al cambiar contraseña'}`, 'error');
            }
        } catch (e) {
            mostrarToast(`❌ Error: ${e.message}`, 'error');
        }
    }

    // ── Eliminar Usuario ───────────────────────────────
    let eliminarIdPendiente = null;

    function eliminarUsuario(id, nombre) {
        eliminarIdPendiente = id;
        document.getElementById('eliminarNombreUsuario').textContent = nombre;
        document.getElementById('modalEliminar').classList.remove('hidden');
    }

    function cerrarModalEliminar() {
        document.getElementById('modalEliminar').classList.add('hidden');
        eliminarIdPendiente = null;
    }

    async function confirmarEliminacion() {
        if (!eliminarIdPendiente) return;
        const btn = document.getElementById('btnConfirmarEliminar');
        btn.disabled = true;
        btn.innerHTML = '<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Eliminando...';

        try {
            const resp = await fetch(`${API_BASE_URL}/api/v1/usuarios/${eliminarIdPendiente}`, {
                method: 'DELETE',
                headers: authHeaders(),
            });
            const data = await resp.json();

            if (resp.ok) {
                mostrarToast(`✅ Usuario eliminado correctamente.`, 'success');
                cargarUsuarios();
            } else {
                mostrarToast(`⚠️ ${data.detail || 'Error al eliminar'}`, 'error');
            }
        } catch (e) {
            mostrarToast(`❌ Error: ${e.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-trash3-fill"></i> Sí, Eliminar';
            cerrarModalEliminar();
        }
    }

    // ── Helpers ────────────────────────────────────────
    function abrirModalNuevo() {
        document.getElementById('nuevoNombre').value = '';
        document.getElementById('nuevoUsername').value = '';
        document.getElementById('nuevoPassword').value = '';
        document.getElementById('nuevoRol').value = 'vendedor';
        document.getElementById('modalNuevo').classList.remove('hidden');
        setTimeout(() => document.getElementById('nuevoNombre').focus(), 100);
    }
    function cerrarModalNuevo() { document.getElementById('modalNuevo').classList.add('hidden'); }

    function abrirModalPassword(id, nombre) {
        document.getElementById('passwordUsuarioId').value = id;
        document.getElementById('passwordUsuarioNombre').textContent = nombre;
        document.getElementById('nuevaPassword').value = '';
        document.getElementById('modalPassword').classList.remove('hidden');
        setTimeout(() => document.getElementById('nuevaPassword').focus(), 100);
    }
    function cerrarModalPassword() { document.getElementById('modalPassword').classList.add('hidden'); }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    </script>

    <!-- ═══ MODAL: Confirmar Eliminación ═══ -->
    <div id="modalEliminar" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="cerrarModalEliminar()"></div>
        <div class="relative w-full max-w-sm bg-[#1A1A1A] border border-red-500/30 rounded-2xl shadow-2xl overflow-hidden" style="animation: fadeInUp 0.3s ease-out;">
            <div class="flex flex-col items-center text-center px-6 pt-7 pb-2">
                <div class="w-16 h-16 bg-red-500/10 rounded-2xl flex items-center justify-center mb-4 border border-red-500/20">
                    <i class="bi bi-exclamation-triangle-fill text-red-400 text-3xl"></i>
                </div>
                <h3 class="text-white font-bold text-lg mb-2">⚠️ Eliminar Usuario</h3>
                <p class="text-gray-400 text-sm leading-relaxed">
                    ¿Estás seguro de eliminar al usuario<br>
                    <span id="eliminarNombreUsuario" class="text-red-400 font-bold"></span>?
                </p>
                <p class="text-gray-500 text-xs mt-2">Esta acción no se puede deshacer.</p>
            </div>
            <div class="flex gap-3 px-6 py-5">
                <button onclick="cerrarModalEliminar()" class="flex-1 py-3 rounded-xl font-bold text-sm text-gray-300 bg-gray-700/50 hover:bg-gray-700 border border-gray-600/50 transition-all duration-300">
                    Cancelar
                </button>
                <button id="btnConfirmarEliminar" onclick="confirmarEliminacion()" class="flex-1 py-3 rounded-xl font-bold text-sm text-white bg-red-600 hover:bg-red-700 border border-red-500/50 transition-all duration-300 hover:shadow-lg hover:shadow-red-600/30 flex items-center justify-center gap-2">
                    <i class="bi bi-trash3-fill"></i> Sí, Eliminar
                </button>
            </div>
        </div>
    </div>

    </main>
</body>
