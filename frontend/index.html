<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Venta — MI GIMNASIO PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #FFD700;
            --accent-hover: #E6C200;
            --surface: #0D0D0D;
            --surface-light: #1A1A1A;
            --surface-card: #111111;
            --success-glow: #00c853;
            --text-muted: #8892b0;
        }

        * { font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(135deg, #050505 0%, #0D0D0D 50%, #111111 100%);
            min-height: 100vh;
        }

        /* ── Header ─────────────────────────────── */
        .header-bar {
            background: linear-gradient(90deg, #0D0D0D 0%, #1A1A1A 50%, #0D0D0D 100%);
            border-bottom: 3px solid var(--accent);
            padding: 1rem 0;
            box-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }
        .header-bar h1 {
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
        }
        .header-bar .accent { color: var(--accent); }
        .header-bar .badge-env {
            background: var(--accent);
            color: #0D0D0D;
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            vertical-align: middle;
        }

        /* ── Cards ──────────────────────────────── */
        .card {
            background: rgba(17, 17, 17, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.12);
            border-radius: 16px;
            transition: border-color 0.3s;
        }
        .card:hover { border-color: rgba(255, 215, 0, 0.35); }
        .card-header {
            background: rgba(255, 215, 0, 0.06);
            border-bottom: 1px solid rgba(255, 215, 0, 0.12);
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 0.85rem 1.25rem;
            border-radius: 16px 16px 0 0 !important;
        }
        .card-header i { color: var(--accent); margin-right: 8px; }

        /* ── Form Controls ──────────────────────── */
        .form-control, .form-select {
            background: rgba(13, 13, 13, 0.8);
            border: 1px solid rgba(136, 146, 176, 0.2);
            color: #e6e6e6;
            font-size: 0.88rem;
            padding: 0.6rem 0.85rem;
            border-radius: 10px;
            transition: all 0.25s;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(13, 13, 13, 0.95);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.15);
            color: #fff;
        }
        .form-label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.35rem;
        }

        /* ── Product Items ──────────────────────── */
        .producto-item {
            background: rgba(13, 13, 13, 0.6);
            border: 1px solid rgba(255, 215, 0, 0.08);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
            animation: slideIn 0.3s ease-out;
        }
        .producto-item:hover { background: rgba(26, 26, 26, 0.9); border-color: rgba(255, 215, 0, 0.2); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .producto-nombre { font-weight: 500; font-size: 0.9rem; }
        .producto-precio { color: var(--accent); font-weight: 700; font-size: 0.95rem; }
        .btn-remove {
            background: none;
            border: none;
            color: #ff6b6b;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .btn-remove:hover { background: rgba(255, 107, 107, 0.15); }

        /* ── Total Bar ──────────────────────────── */
        .total-bar {
            background: linear-gradient(135deg, #0D0D0D 0%, #1A1A1A 100%);
            border: 2px solid var(--accent);
            border-radius: 14px;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.08);
        }
        .total-label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .total-amount {
            font-size: 2.4rem;
            font-weight: 800;
            color: #fff;
            line-height: 1;
        }
        .total-amount .currency { color: var(--accent); font-size: 1.4rem; }

        /* ── Buttons ────────────────────────────── */
        .btn-facturar {
            background: linear-gradient(135deg, #FFD700 0%, #E6C200 100%);
            border: none;
            color: #0D0D0D;
            font-weight: 800;
            font-size: 1rem;
            padding: 0.9rem 2rem;
            border-radius: 12px;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .btn-facturar:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
            color: #0D0D0D;
        }
        .btn-facturar:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-facturar .spinner-border { width: 1.1rem; height: 1.1rem; border-width: 2px; }

        .btn-pdf {
            background: linear-gradient(135deg, #00c853 0%, #00a844 100%);
            border: none;
            color: #fff;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 0.85rem 2rem;
            border-radius: 12px;
            transition: all 0.3s;
            animation: pulseGlow 2s infinite;
        }
        .btn-pdf:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 200, 83, 0.4);
            color: #fff;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 200, 83, 0.3); }
            50% { box-shadow: 0 0 20px rgba(0, 200, 83, 0.5); }
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
            border: none;
            color: #fff;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 0.85rem 2rem;
            border-radius: 12px;
            transition: all 0.3s;
            animation: pulseGlowWA 2s infinite;
        }
        .btn-whatsapp:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
            color: #fff;
        }
        @keyframes pulseGlowWA {
            0%, 100% { box-shadow: 0 0 5px rgba(37, 211, 102, 0.3); }
            50% { box-shadow: 0 0 20px rgba(37, 211, 102, 0.5); }
        }

        .btn-group-acciones {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }
        .btn-group-acciones .btn-pdf,
        .btn-group-acciones .btn-whatsapp {
            flex: 1;
        }

        .btn-add-product {
            background: rgba(255, 215, 0, 0.1);
            border: 1px dashed var(--accent);
            color: var(--accent);
            font-weight: 600;
            border-radius: 10px;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .btn-add-product:hover {
            background: rgba(255, 215, 0, 0.2);
            color: var(--accent);
        }

        /* ── Alerts ─────────────────────────────── */
        .result-card {
            border-radius: 14px;
            border: none;
            animation: slideIn 0.4s ease-out;
        }

        /* ── Misc ───────────────────────────────── */
        .secuencial-badge {
            font-family: 'Courier New', monospace;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 0.95rem;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 1px;
        }
        .divider {
            border: none;
            border-top: 1px solid rgba(136, 146, 176, 0.15);
            margin: 1.5rem 0;
        }
        .empty-cart {
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
        }
        .empty-cart i { font-size: 2.5rem; display: block; margin-bottom: 0.75rem; opacity: 0.4; }

        /* ── Autocomplete Dropdown ────────────────── */
        .autocomplete-wrapper {
            position: relative;
            flex: 1;
        }
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #111111;
            border: 1px solid rgba(255, 215, 0, 0.25);
            border-radius: 10px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 100;
            margin-top: 4px;
            display: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }
        .autocomplete-list.show { display: block; }
        .autocomplete-item {
            padding: 0.6rem 0.85rem;
            cursor: pointer;
            font-size: 0.85rem;
            color: #e6e6e6;
            border-bottom: 1px solid rgba(136, 146, 176, 0.08);
            transition: background 0.15s;
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover,
        .autocomplete-item.active {
            background: rgba(255, 215, 0, 0.12);
        }
        .autocomplete-item .item-code {
            font-family: monospace;
            font-size: 0.72rem;
            color: var(--accent);
            margin-right: 6px;
        }
        .autocomplete-item .item-price {
            float: right;
            font-weight: 700;
            color: var(--accent);
        }
        .autocomplete-item .item-iva {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-left: 4px;
        }
    </style>
</head>

<!-- ═══ MAIN CONTENT ═══ -->
<div class="container py-4">
    <div class="row g-4">

        <!-- ── COL IZQUIERDA: Cliente + Productos ── -->
        <div class="col-lg-7">

            <!-- CARD: Cliente -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// PUNTO DE VENTA — Lógica JavaScript
// ═══════════════════════════════════════════════════════════

const API_BASE = 'https://api-facturacion-gym.onrender.com/api/v1';

// ── Estado de la venta ──────────────────────────────────
let carrito = [];
let secuencialActual = 1;
let busquedaTimeout = null; // Para debounce de búsqueda
let catalogoProductos = []; // Productos cargados de la API
let productoSeleccionado = null; // Producto elegido del catálogo
let autocompleteIndex = -1; // Índice activo del dropdown

// Intentar cargar el último secuencial del localStorage
const savedSeq = localStorage.getItem('gympos_secuencial');
if (savedSeq) secuencialActual = parseInt(savedSeq, 10);
actualizarSecuencialUI();

// ── Cargar catálogo de productos al inicio ──────────────
(function() {
    fetch(`${API_BASE}/productos`)
        .then(r => r.ok ? r.json() : [])
        .then(data => { catalogoProductos = data; })
        .catch(() => { catalogoProductos = []; });
})();

// ── Autocompletado de productos ─────────────────────────
(function() {
    const input = document.getElementById('inputProducto');
    const list = document.getElementById('autocompleteList');
    const precioInput = document.getElementById('inputPrecio');
    let debounceAC = null;

    input.addEventListener('input', function() {
        productoSeleccionado = null;
        autocompleteIndex = -1;
        const val = this.value.trim().toLowerCase();

        if (debounceAC) clearTimeout(debounceAC);

        if (!val) {
            list.classList.remove('show');
            list.innerHTML = '';
            return;
        }

        debounceAC = setTimeout(() => {
            const filtrados = catalogoProductos.filter(p =>
                p.nombre.toLowerCase().includes(val) ||
                p.codigo.toLowerCase().includes(val)
            ).slice(0, 8);

            if (filtrados.length === 0) {
                list.classList.remove('show');
                list.innerHTML = '';
                return;
            }

            list.innerHTML = filtrados.map((p, i) => {
                const ivaLabel = p.iva_aplica ? 'IVA' : 'Sin IVA';
                return `<div class="autocomplete-item" data-index="${i}"
                             onclick="seleccionarProductoCatalogo(${i})">
                    <span class="item-price">$${parseFloat(p.precio_unitario).toFixed(2)}</span>
                    <span class="item-code">${escapeHtmlIndex(p.codigo)}</span>
                    ${escapeHtmlIndex(p.nombre)}
                    <span class="item-iva">(${ivaLabel})</span>
                </div>`;
            }).join('');

            list._filtrados = filtrados;
            list.classList.add('show');
        }, 150);
    });

    input.addEventListener('keydown', function(e) {
        const items = list.querySelectorAll('.autocomplete-item');
        if (!items.length) return;

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            autocompleteIndex = Math.min(autocompleteIndex + 1, items.length - 1);
            actualizarItemActivo(items);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            autocompleteIndex = Math.max(autocompleteIndex - 1, 0);
            actualizarItemActivo(items);
        } else if (e.key === 'Enter' && autocompleteIndex >= 0) {
            e.preventDefault();
            seleccionarProductoCatalogo(autocompleteIndex);
        } else if (e.key === 'Escape') {
            list.classList.remove('show');
            autocompleteIndex = -1;
        }
    });

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.autocomplete-wrapper')) {
            list.classList.remove('show');
            autocompleteIndex = -1;
        }
    });

    function actualizarItemActivo(items) {
        items.forEach((it, i) => {
            it.classList.toggle('active', i === autocompleteIndex);
        });
        if (items[autocompleteIndex]) {
            items[autocompleteIndex].scrollIntoView({ block: 'nearest' });
        }
    }
})();

function seleccionarProductoCatalogo(index) {
    const list = document.getElementById('autocompleteList');
    const input = document.getElementById('inputProducto');
    const precioInput = document.getElementById('inputPrecio');
    const producto = list._filtrados[index];

    if (!producto) return;

    productoSeleccionado = producto;
    input.value = producto.nombre;
    precioInput.value = parseFloat(producto.precio_unitario).toFixed(2);

    list.classList.remove('show');
    list.innerHTML = '';
    autocompleteIndex = -1;
}

function escapeHtmlIndex(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ── Auto-búsqueda de cliente por cédula ─────────────────
(function() {
    const inputCedula = document.getElementById('identificacion');
    const spinner     = document.getElementById('cedulaSpinner');
    const statusIcon  = document.getElementById('cedulaStatus');
    const msgDiv      = document.getElementById('clienteMsg');

    // Se dispara mientras escribe (con debounce de 400ms)
    inputCedula.addEventListener('input', function() {
        const val = this.value.replace(/\D/g, ''); // solo dígitos
        this.value = val; // limpiar caracteres no numéricos

        // Ocultar estado previo mientras escribe
        statusIcon.style.display = 'none';
        msgDiv.style.display = 'none';

        // Cancelar búsqueda previa
        if (busquedaTimeout) clearTimeout(busquedaTimeout);

        // Buscar automáticamente cuando tenga 10 (cédula) o 13 (RUC) dígitos
        if (val.length === 10 || val.length === 13) {
            busquedaTimeout = setTimeout(() => buscarClientePorCedula(val), 400);
        }
    });

    // También buscar al salir del campo (blur)
    inputCedula.addEventListener('blur', function() {
        const val = this.value.trim();
        if (val.length >= 10) {
            buscarClientePorCedula(val);
        }
    });
})();

async function buscarClientePorCedula(cedula) {
    const spinner    = document.getElementById('cedulaSpinner');
    const statusIcon = document.getElementById('cedulaStatus');
    const msgDiv     = document.getElementById('clienteMsg');
    const inputCedula = document.getElementById('identificacion');

    // Mostrar spinner, ocultar estado previo
    spinner.style.display = 'block';
    statusIcon.style.display = 'none';
    msgDiv.style.display = 'none';
    inputCedula.style.borderColor = 'rgba(136, 146, 176, 0.2)';

    try {
        const resp = await fetch(`${API_BASE}/clientes/${cedula}`);

        spinner.style.display = 'none';

        if (resp.ok) {
            // ✅ Cliente ENCONTRADO — auto-rellenar
            const cliente = await resp.json();

            document.getElementById('razonSocial').value = cliente.nombre_completo || '';
            document.getElementById('email').value       = cliente.correo || '';
            document.getElementById('telefono').value    = cliente.telefono || '';
            document.getElementById('direccion').value   = cliente.direccion || '';

            // UI: borde verde + ícono check
            inputCedula.style.borderColor = 'var(--success-glow)';
            statusIcon.innerHTML = '<i class="bi bi-check-circle-fill" style="color: #00c853; font-size: 1rem;"></i>';
            statusIcon.style.display = 'block';

            // Mensaje
            msgDiv.textContent = `✅ Cliente encontrado: ${cliente.nombre_completo}`;
            msgDiv.style.display = 'block';
            msgDiv.style.background = 'rgba(0, 200, 83, 0.1)';
            msgDiv.style.color = '#00c853';
            msgDiv.style.border = '1px solid rgba(0, 200, 83, 0.2)';

            // Hacer focus al siguiente campo lógico (producto)
            setTimeout(() => document.getElementById('inputProducto')?.focus(), 300);

        } else if (resp.status === 404) {
            // 🆕 Cliente NO encontrado — es nuevo
            statusIcon.innerHTML = '<i class="bi bi-person-plus-fill" style="color: var(--accent); font-size: 1rem;"></i>';
            statusIcon.style.display = 'block';

            msgDiv.textContent = '🆕 Cliente nuevo — ingresa sus datos manualmente';
            msgDiv.style.display = 'block';
            msgDiv.style.background = 'rgba(255, 215, 0, 0.08)';
            msgDiv.style.color = 'var(--accent)';
            msgDiv.style.border = '1px solid rgba(255, 215, 0, 0.15)';

            // Focus al campo nombre para que escriba rápido
            setTimeout(() => document.getElementById('razonSocial')?.focus(), 300);

        } else {
            // Otro error (500, etc) — silencioso
            console.warn('Error buscando cliente:', resp.status);
        }

    } catch (err) {
        // Error de red — no bloquear, solo log
        spinner.style.display = 'none';
        console.warn('No se pudo buscar cliente:', err.message);
    }

    // Limpiar borde después de 5 segundos
    setTimeout(() => {
        inputCedula.style.borderColor = '';
    }, 5000);
}

// ── Agregar producto ────────────────────────────────────
function agregarProducto() {
    const input = document.getElementById('inputProducto');
    const precioInput = document.getElementById('inputPrecio');
    const descripcion = input.value.trim();
    const precio = parseFloat(precioInput.value);

    if (!descripcion) return;
    if (isNaN(precio) || precio <= 0) {
        mostrarError('Ingrese un precio válido.');
        return;
    }

    let codigo = '';
    let codigoIva = '4'; // IVA 15% por defecto

    if (productoSeleccionado && productoSeleccionado.nombre === descripcion) {
        codigo = productoSeleccionado.codigo;
        codigoIva = productoSeleccionado.iva_aplica ? '4' : '0';
    } else {
        codigo = 'CUSTOM';
    }

    carrito.push({ codigo, descripcion, precio, cantidad: 1, codigo_porcentaje_iva: codigoIva });

    input.value = '';
    precioInput.value = '';
    productoSeleccionado = null;
    renderCarrito();
}

// ── Eliminar producto ───────────────────────────────────
function eliminarProducto(index) {
    carrito.splice(index, 1);
    renderCarrito();
}

// ── Renderizar carrito ──────────────────────────────────
function renderCarrito() {
    const lista = document.getElementById('listaProductos');
    const empty = document.getElementById('emptyCart');

    if (carrito.length === 0) {
        lista.innerHTML = '<div class="empty-cart" id="emptyCart"><i class="bi bi-inbox"></i>Agrega productos para comenzar</div>';
        actualizarTotales(0, 0);
        return;
    }

    let html = '';
    let subtotal = 0;
    let subtotalConIva = 0;
    let subtotalSinIva = 0;

    carrito.forEach((item, i) => {
        const itemTotal = item.cantidad * item.precio;
        const aplicaIva = item.codigo_porcentaje_iva === '4';
        if (aplicaIva) {
            subtotalConIva += itemTotal;
        } else {
            subtotalSinIva += itemTotal;
        }
        subtotal += itemTotal;
        const ivaTag = aplicaIva ? '<span style="color: var(--success-glow); font-size:0.65rem; margin-left:4px;">IVA</span>' : '<span style="color: var(--text-muted); font-size:0.65rem; margin-left:4px;">0%</span>';
        html += `
            <div class="producto-item">
                <div>
                    <div class="producto-nombre">${escapeHtmlIndex(item.descripcion)}${ivaTag}</div>
                    <small style="color: var(--text-muted)">${escapeHtmlIndex(item.codigo)} × ${item.cantidad}</small>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="producto-precio">$${itemTotal.toFixed(2)}</span>
                    <button class="btn-remove" onclick="eliminarProducto(${i})" title="Quitar">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
            </div>
        `;
    });

    lista.innerHTML = html;

    const iva = subtotalConIva * 0.15;
    actualizarTotales(subtotal, iva);
}

function actualizarTotales(subtotal, iva) {
    document.getElementById('subtotalDisplay').textContent = `$${subtotal.toFixed(2)}`;
    document.getElementById('ivaDisplay').textContent = `$${iva.toFixed(2)}`;
    document.getElementById('totalDisplay').textContent = (subtotal + iva).toFixed(2);
}

function actualizarSecuencialUI() {
    document.getElementById('secuencialBadge').textContent = String(secuencialActual).padStart(9, '0');
}

// ── Emitir Factura ──────────────────────────────────────
async function emitirFactura() {
    // Validaciones
    const identificacion = document.getElementById('identificacion').value.trim();
    const razonSocial = document.getElementById('razonSocial').value.trim();
    const email = document.getElementById('email').value.trim();
    const direccion = document.getElementById('direccion').value.trim();
    const telefono = document.getElementById('telefono').value.trim();

    if (!identificacion) return mostrarError('Ingrese la cédula o RUC del cliente.');
    if (!razonSocial) return mostrarError('Ingrese el nombre o razón social del cliente.');
    if (carrito.length === 0) return mostrarError('Agregue al menos un producto.');

    // Determinar tipo de identificación
    let tipoId;
    if (identificacion.length === 13) tipoId = '04'; // RUC
    else if (identificacion.length === 10) tipoId = '05'; // Cédula
    else return mostrarError('La identificación debe tener 10 dígitos (cédula) o 13 dígitos (RUC).');

    // Fecha actual dd/mm/yyyy
    const hoy = new Date();
    const fechaEmision = `${String(hoy.getDate()).padStart(2, '0')}/${String(hoy.getMonth() + 1).padStart(2, '0')}/${hoy.getFullYear()}`;

    // Armar productos
    const productos = carrito.map(item => ({
        codigo: item.codigo,
        descripcion: item.descripcion,
        cantidad: item.cantidad,
        precio_unitario: item.precio.toFixed(2),
        codigo_porcentaje_iva: item.codigo_porcentaje_iva || '4'
    }));

    // Armar payload
    const payload = {
        secuencial: String(secuencialActual).padStart(9, '0'),
        fecha_emision: fechaEmision,
        cliente: {
            tipo_identificacion: tipoId,
            identificacion: identificacion,
            razon_social: razonSocial,
            direccion: direccion || null,
            email: email || null,
            telefono: telefono || null
        },
        productos: productos,
        forma_pago: '01'
    };

    // UI: loading
    const btn = document.getElementById('btnFacturar');
    const btnOriginal = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Procesando con el SRI...';
    document.getElementById('resultArea').innerHTML = '';

    try {
        const resp = await fetch(`${API_BASE}/facturar`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await resp.json();

        if (resp.ok) {
            const estado = data.recepcion?.estado || 'PROCESADA';
            const facturaId = data.id;

            // Incrementar secuencial
            secuencialActual++;
            localStorage.setItem('gympos_secuencial', secuencialActual);
            actualizarSecuencialUI();

            // Resultado exitoso
            document.getElementById('resultArea').innerHTML = `
                <div class="alert alert-success result-card p-3">
                    <div class="d-flex align-items-center mb-2">
                        <i class="bi bi-check-circle-fill me-2" style="font-size: 1.3rem;"></i>
                        <strong>¡Factura emitida!</strong>
                    </div>
                    <div style="font-size: 0.82rem; opacity: 0.9;">
                        <div><strong>Estado SRI:</strong> ${estado}</div>
                        <div><strong>Clave acceso:</strong></div>
                        <code style="font-size: 0.72rem; word-break: break-all;">${data.clave_acceso}</code>
                    </div>
                </div>
                ${facturaId ? `
                <div class="btn-group-acciones">
                    <a href="${API_BASE.replace('/api/v1', '')}/api/v1/facturas/${facturaId}/pdf"
                       target="_blank" class="btn btn-pdf">
                        <i class="bi bi-printer-fill me-2"></i>
                        Ver / Descargar PDF
                    </a>
                    <button class="btn btn-whatsapp" onclick="enviarWhatsApp(${facturaId})">
                        📲 Enviar por WhatsApp
                    </button>
                </div>` : ''}
            `;

            // Limpiar carrito
            carrito = [];
            renderCarrito();

        } else {
            const detail = data.detail || JSON.stringify(data);
            mostrarError(`Error ${resp.status}: ${detail}`);
        }

    } catch (err) {
        mostrarError(`No se pudo conectar con la API: ${err.message}. ¿Está corriendo uvicorn?`);
    } finally {
        btn.disabled = false;
        btn.innerHTML = btnOriginal;
    }
}

function mostrarError(mensaje) {
    document.getElementById('resultArea').innerHTML = `
        <div class="alert alert-danger result-card p-3">
            <div class="d-flex align-items-center">
                <i class="bi bi-exclamation-triangle-fill me-2" style="font-size: 1.2rem;"></i>
                <span style="font-size: 0.88rem;">${mensaje}</span>
            </div>
        </div>
    `;
}

// ── Enviar recibo por WhatsApp ──────────────────────────
function enviarWhatsApp(facturaId) {
    let telefono = document.getElementById('telefono').value.trim();

    if (!telefono) {
        mostrarError('Ingrese un número de teléfono antes de enviar por WhatsApp.');
        return;
    }

    // 1. Limpiar: quitar espacios, guiones y paréntesis
    let numeroLimpio = telefono.replace(/[\s\-\(\)]/g, '');

    // 2. Normalizar código de Ecuador: si empieza con '0', cambiar por '593'
    if (numeroLimpio.startsWith('0')) {
        numeroLimpio = '593' + numeroLimpio.substring(1);
    }
    
    // Si el número es corto (ej. 998877665) y no tiene 593, se lo ponemos
    if (numeroLimpio.length === 9 && !numeroLimpio.startsWith('593')) {
        numeroLimpio = '593' + numeroLimpio;
    }

    // 3. Armar URL del PDF (usando tu API_BASE de Render)
    const urlPdf = `${API_BASE}/facturas/${facturaId}/pdf`;

    // 4. Armar mensaje con emojis y tildes
    const mensaje = `¡Hola! 💪 Gracias por tu pago. Aquí tienes el link para descargar tu recibo electrónico: ${urlPdf}`;

    // 5. Codificar para que WhatsApp entienda los símbolos especiales
    const mensajeCodificado = encodeURIComponent(mensaje);
    
    // 6. Abrir WhatsApp Web / App
    window.open(`https://api.whatsapp.com/send?phone=${numeroLimpio}&text=${mensajeCodificado}`, '_blank');
}
</script>
